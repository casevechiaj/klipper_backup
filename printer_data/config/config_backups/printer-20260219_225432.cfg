stealthchop_threshold: 0
#driver_SGTHRS: 0

[tmc2209 stepper_z]
uart_pin: PC6
##diag_pin: PG10
run_current: 0.9
hold_current: 0.6
interpolate: false
sense_resistor: 0.110
stealthchop_threshold: 0
#driver_SGTHRS: 0

[tmc2209 stepper_z1]
uart_pin: PC7
##diag_pin: PG11
run_current: 0.9
hold_current: 0.6
interpolate: false
sense_resistor: 0.110
stealthchop_threshold: 0
#driver_SGTHRS: 0

[tmc2209 extruder]     #On EBB42 Toolhead
uart_pin: toolhead: PA15
run_current: 0.9
#hold_current: 0.55
interpolate: false
stealthchop_threshold: 0
sense_resistor: 0.110

