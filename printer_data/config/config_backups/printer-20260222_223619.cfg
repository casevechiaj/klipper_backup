# This file contains common pin mappings for the BigTreeTech Octopus
# and Octopus Pro boards. To use this config, start by identifying the
# micro-controller on the board - it may be an STM32F446, STM32F429,
# or an STM32H723.  Select the appropriate micro-controller in "make
# menuconfig" and select "Enable low-level configuration options". For
# STM32F446 boards the firmware should be compiled with a "32KiB
# bootloader" and a "12MHz crystal" clock reference. For STM32F429
# boards use a "32KiB bootloader" and an "8MHz crystal". For STM32H723
# boards use a "128KiB bootloader" and a "25Mhz crystal".

# See docs/Config_Reference.md for a description of parameters.

[include EBB42.cfg]
[include mainsail.cfg]
[include input shaper.cfg]
#[include adxl.cfg]
[exclude_object]
[include gcode arcs.cfg]
#[include START_PRINT.cfg]
#[include END_PRINT.cfg]
#[include SHAKETUNE.cfg]
[include macros.cfg]
[include Speed Test.cfg]

# Driver0
[stepper_x]
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
endstop_pin: ^toolhead: PB3
position_min: -24
position_endstop: -24
position_max: 230
homing_speed: 50

# Driver1
[stepper_y]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
endstop_pin: PG6
position_min: -17
position_endstop: -17
position_max: 223
homing_speed: 50

# Driver2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 245
homing_retract_dist: 0

# Driver3
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
#endstop_pin: PG11
microsteps: 16
rotation_distance: 8

[extruder]
max_extrude_only_distance: 1000.0
step_pin: toolhead: PD0
dir_pin: !toolhead: PD1
enable_pin: !toolhead: PD2
heater_pin: toolhead: PB13
sensor_pin: toolhead: PA3
rotation_distance: 23.4015236582016
microsteps: 16
nozzle_diameter: 0.600
filament_diameter: 1.750
#pressure_advance: 0.17
#control: mpc
heater_power: 40
cooling_fan: fan
                                      #Black RapidPETG
filament_diameter: 1.75
filament_density: 1.20
filament_heat_capacity: 1.25
                                      #RPLA Yellow, Brown, Black
#filament_diameter: 1.75
#filament_density: 1.23
#filament_heat_capacity: 1.75
min_temp: 0
max_temp: 300
#sensor_type: EPCOS 100K B57560G104F
sensor_type: Generic 3950
min_extrude_temp: 0
max_extrude_cross_section: 50

