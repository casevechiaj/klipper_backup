[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_2E0039000751303532383235-if00
# CAN bus is also available on this board

#[printer]
#kinematics: cartesian
#max_velocity: 650
#max_accel: 71000
#max_z_velocity: 25
#max_z_accel: 100

[printer]
kinematics: limited_cartesian
max_x_velocity: 650
#   This sets the maximum velocity (in mm/s) of movement along the x
#   axis. This setting can be used to restrict the maximum speed of
#   the x stepper motor. The default is to use max_velocity for
#   max_x_velocity.
max_y_velocity: 650
#   This sets the maximum velocity (in mm/s) of movement along the y
#   axis. This setting can be used to restrict the maximum speed of
#   the y stepper motor. The default is to use max_velocity for
#   max_x_velocity.
max_z_velocity: 25
#   See cartesian above.
max_velocity: 900
#   In order to get maximum velocity gains on diagonals, this should be equal or
#   greater than the hypotenuse (sqrt(x*x + y*y)) of max_x_velocity and
#   max_y_velocity.
max_x_accel: 25000
#   This sets the maximum acceleration (in mm/s^2) of movement along
#   the x axis. It limits the acceleration of the x stepper motor. The
#   default is to use max_accel for max_x_accel.
max_y_accel: 5000
#   This sets the maximum acceleration (in mm/s^2) of movement along
#   the y axis. It limits the acceleration of the y stepper motor. The
#   default is to use max_accel for max_y_accel.
max_z_accel: 100
# See cartesian above.
max_accel: 25000
# See cartesian above.
scale_xy_accel: True
#   When true, scales the XY limits by the current tool head acceleration.
#   The factor is: slicer accel / hypot(max_x_accel, max_y_accel).
#   See below.

[bed_mesh]
speed: 150
horizontal_move_z: 5
mesh_min: 25, 20
mesh_max: 191, 200
probe_count: 5, 5
mesh_pps: 2, 3
algorithm: bicubic
bicubic_tension: 0.2
adaptive_margin: 1

[bltouch]
sensor_pin: ^toolhead: PB8
control_pin: toolhead: PB9
probe_with_touch_mode: true
stow_on_each_sample: false
x_offset: 44
y_offset: 5
#z_offset: 2.149
speed: 5.0
samples: 2
sample_retract_dist: 5.0
lift_speed: 50

[safe_z_home]
home_xy_position: 69, 127
speed: 150
z_hop: 10
z_hop_speed: 20

[auto_speed]
axis: x, y  ; #One or multiple of `x`, `y`, `diag_x`, `diag_y`, `z`

#margin: 20            ; How far away from your axes to perform movements

#settling_home: 1      ; Perform settling home before starting Auto Speed
#max_missed: 1.0       ; Maximum full steps that can be missed
#endstop_samples: 3    ; How many endstop samples to take for endstop variance

#accel_min: 1000.0     ; Minimum acceleration test may try
#accel_max: 50000.0    ; Maximum acceleration test may try
#accel_accu: 0.05      ; Keep binary searching until the result is within this percentage

#velocity_min: 50.0    ; Minimum velocity test may try
#velocity_max: 5000.0  ; Maximum velocity test may try
#velocity_accu: 0.05   ; Keep binary searching until the result is within this percentage

#derate: 0.8           ; Derate discovered results by this amount

#validate_margin: Unset      ; Margin for VALIDATE, Defaults to margin
#validate_inner_margin: 20.0 ; Margin for VALIDATE inner pattern
#validate_iterations: 50     ; Perform VALIDATE pattern this many times

#results_dir: ~/printer_data/config ; Destination directory for graphs

