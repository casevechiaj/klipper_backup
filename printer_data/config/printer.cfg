#hold_current: 0.55
interpolate: false
sense_resistor: 0.110
stealthchop_threshold: 0
#driver_SGTHRS: 0

[tmc2209 stepper_z]
uart_pin: PC6
##diag_pin: PG10
run_current: 0.8
hold_current: 0.5
interpolate: false
sense_resistor: 0.110
