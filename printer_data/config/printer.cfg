[heater_bed]
heater_pin: PA1
sensor_pin: PF3 # TB
sensor_type: EPCOS 100K B57560G104F
#control: pid
#pid_Kp: 63.970
#pid_Ki: 1.143
#pid_Kd: 894.783
min_temp: 0
max_temp: 130

[temperature_sensor pi_temp]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[multi_pin my_controller_fan_pins]
pins: PA8, PE5 # fans 0 & 1

[controller_fan my_controller_fan]
pin: multi_pin:my_controller_fan_pins
max_power: .5
shutdown_speed: 1
cycle_time: .1
hardware_pwm: false
kick_start_time: .1
#off_below: 0
#   See the "fan" section for a description of the above parameters.
fan_speed: 1.0
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when a heater or stepper driver is active.
#   The default is 1.0
#idle_timeout:
#   The amount of time (in seconds) after a stepper driver or heater
#   was active and the fan should be kept running. The default
#   is 30 seconds.
#idle_speed: 1
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when a heater or stepper driver was active and
#   before the idle_timeout is reached. The default is fan_speed.
stepper: stepper_x, stepper_y, stepper_z, stepper_z1
#   Name of the config section defining the heater/stepper that this fan
#   is associated with. If a comma separated list of heater/stepper names
#   is provided here, then the fan will be enabled when any of the given
#   heaters/steppers are enabled. The default heater is "extruder", the
#   default stepper is all of them.

# Hotend fan for Input Shaping
#[fan_generic extruder_partfan1]
#pin: toolhead: PA0

#[fan_generic extruder_partfan2]
#pin: PD12

#[fan_generic extruder_partfan3]
#pin: PD13

#[heater_fan fan3]
#pin: PD13

#[heater_fan fan4]
#pin: PD14

#[controller_fan fan5]
#pin: PD15

[mcu]
#serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_2E0039000751303532383235-if00
# CAN bus is also available on this board
canbus_uuid: 631bfd3793ba

[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mcu
# Remove either the serial or canbus_uuid line dependant on your setup.
#serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_600056000650303448383620-if00
canbus_uuid: 3a7d8bd6d69c
#restart_method: command # Not needed for probes using CAN. 

[cartographer]
mcu: cartographer
x_offset: 46 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 21 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: no # For extra output

#[printer]
#kinematics: cartesian
#max_velocity: 650
#max_accel: 71000
#max_z_velocity: 25
#max_z_accel: 100

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 6000
max_z_velocity: 25
max_z_accel: 100
square_corner_velocity: 5

#[bed_mesh]
#speed: 150
#horizontal_move_z: 5
#mesh_min: -22, -1
#mesh_max: 186, 231
#probe_count: 5, 5
#mesh_pps: 2, 3
#algorithm: bicubic
#bicubic_tension: 0.2
#adaptive_margin: 1

[bed_mesh]
zero_reference_position: 113, 113 # The centre of your bed.
speed: 250
horizontal_move_z: 2
mesh_min: 25, 40 # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 209, 215 # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
probe_count: 15, 15
adaptive_margin: 10
mesh_pps: 0,0 # Disable interpolation - mesh is probably dense enough

#[bltouch]
#sensor_pin: ^toolhead: PB8
#control_pin: toolhead: PB9
#probe_with_touch_mode: true
#stow_on_each_sample: true
#x_offset: 40
#y_offset: 0
#z_offset: 2.149
#speed: 60
#samples: 2
#sample_retract_dist: 5.0
#lift_speed: 50

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[adxl345]
# Select 1 of the cs_pin below depending on the probe you have. 
# Having the wrong one selected will cause an Endless Bootloop
# Cartographer V4 has int2 connected to the probes PA1 pin
cs_pin: cartographer:PA0 # For Cartographer V4
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    113, 113, 20 # Fill out the blank with x and y coordinates where you want to run the resonance test.

[safe_z_home]
home_xy_position: 77, 92
speed: 150
z_hop: 10
z_hop_speed: 10

[auto_speed]
axis: x, y  ; #One or multiple of `x`, `y`, `diag_x`, `diag_y`, `z`

#margin: 20            ; How far away from your axes to perform movements

#settling_home: 1      ; Perform settling home before starting Auto Speed
#max_missed: 1.0       ; Maximum full steps that can be missed
#endstop_samples: 3    ; How many endstop samples to take for endstop variance

#accel_min: 1000.0     ; Minimum acceleration test may try
#accel_max: 50000.0    ; Maximum acceleration test may try
#accel_accu: 0.05      ; Keep binary searching until the result is within this percentage

#velocity_min: 50.0    ; Minimum velocity test may try
#velocity_max: 5000.0  ; Maximum velocity test may try
#velocity_accu: 0.05   ; Keep binary searching until the result is within this percentage

#derate: 0.8           ; Derate discovered results by this amount

#validate_margin: Unset      ; Margin for VALIDATE, Defaults to margin
#validate_inner_margin: 20.0 ; Margin for VALIDATE inner pattern
#validate_iterations: 50     ; Perform VALIDATE pattern this many times

#results_dir: ~/printer_data/config ; Destination directory for graphs

