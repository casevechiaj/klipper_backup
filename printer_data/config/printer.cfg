# This file contains common pin mappings for the BigTreeTech Octopus
# and Octopus Pro boards. To use this config, start by identifying the
# micro-controller on the board - it may be an STM32F446, STM32F429,
# or an STM32H723.  Select the appropriate micro-controller in "make
# menuconfig" and select "Enable low-level configuration options". For
# STM32F446 boards the firmware should be compiled with a "32KiB
# bootloader" and a "12MHz crystal" clock reference. For STM32F429
# boards use a "32KiB bootloader" and an "8MHz crystal". For STM32H723
# boards use a "128KiB bootloader" and a "25Mhz crystal".

# See docs/Config_Reference.md for a description of parameters.

[include EBB42.cfg]
[include mainsail.cfg]
[include input shaper.cfg]
[include adxl cartographer.cfg]
#[include adxl bed.cfg]
[exclude_object]
[include gcode arcs.cfg]
[include START_PRINT.cfg]
#[include END_PRINT.cfg]
#[include SHAKETUNE.cfg]
[include macros.cfg]
#[include Speed Test.cfg]
[include spoolman_macros.cfg]

# Driver0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
endstop_pin: PG6
#endstop_pin: ^toolhead: PB3
position_min: -23
position_endstop: -23
position_max: 240
homing_speed: 75

# Driver1
[stepper_y]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
endstop_pin: PG9
position_min: -16
position_endstop: -16
position_max: 240
homing_speed: 75

# Driver2
[stepper_z]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 245
homing_retract_dist: 0

# Driver3
[stepper_z1]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 8

[extruder]
max_extrude_only_distance: 1000.0
step_pin: toolhead: PD0
dir_pin: !toolhead: PD1
enable_pin: !toolhead: PD2
heater_pin: toolhead: PB13
sensor_pin: toolhead: PA3
rotation_distance: 4.5245834 #SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=extruder DISTANCE=4.54732
microsteps: 16
nozzle_diameter: 0.600
filament_diameter: 1.750
#control: mpc
heater_power: 39
cooling_fan: fan
                                      
filament_diameter: 1.75
filament_density: 1.29
filament_heat_capacity: 1.2

min_temp: 0
max_temp: 300
sensor_type: Generic 3950
min_extrude_temp: 0
max_extrude_cross_section: 50

[heater_bed]
heater_pin: PA1
sensor_pin: PF3 # TB
sensor_type: EPCOS 100K B57560G104F
#control: pid
#pid_Kp: 63.970
#pid_Ki: 1.143
#pid_Kd: 894.783
min_temp: 0
max_temp: 130

[temperature_sensor pi_temp]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[multi_pin my_controller_fan_pins]
pins: PA8, PD12 # fans 0 & 1

[controller_fan my_controller_fan]
pin: multi_pin:my_controller_fan_pins
max_power: .8
shutdown_speed: 1
cycle_time: .1
hardware_pwm: false
kick_start_time: .1
#off_below: 0
#   See the "fan" section for a description of the above parameters.
fan_speed: 1.0
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when a heater or stepper driver is active.
#   The default is 1.0
#idle_timeout:
#   The amount of time (in seconds) after a stepper driver or heater
#   was active and the fan should be kept running. The default
#   is 30 seconds.
#idle_speed: 1
#   The fan speed (expressed as a value from 0.0 to 1.0) that the fan
#   will be set to when a heater or stepper driver was active and
#   before the idle_timeout is reached. The default is fan_speed.
stepper: stepper_x, stepper_y, stepper_z, stepper_z1
#   Name of the config section defining the heater/stepper that this fan
#   is associated with. If a comma separated list of heater/stepper names
#   is provided here, then the fan will be enabled when any of the given
#   heaters/steppers are enabled. The default heater is "extruder", the
#   default stepper is all of them.

# Hotend fan for Input Shaping
#[fan_generic extruder_partfan1]
#pin: toolhead: PA0

###########################################
#  Chamber LED
###########################################

[led caselight]
white_pin: PE5
initial_WHITE: 0.0

[gcode_macro _CASELIGHT_STATE]
variable_auto: 0
gcode:
  # state variable - do not remove

[delayed_gcode caselight_auto]
initial_duration: 5
gcode:
  {% set auto = printer["gcode_macro _CASELIGHT_STATE"].auto %}
  {% if auto == 1 %}
    {% if printer.extruder.temperature > 148 %}
      SET_LED LED=caselight WHITE=1.0
    {% elif printer.extruder.temperature < 144 %}
      SET_LED LED=caselight WHITE=0.0
    {% endif %}
  {% endif %}
  UPDATE_DELAYED_GCODE ID=caselight_auto DURATION=5

[gcode_macro CASELIGHT_ON]
description: Turn caselight on (manual)
gcode:
  SET_GCODE_VARIABLE MACRO=_CASELIGHT_STATE VARIABLE=auto VALUE=0
  SET_LED LED=caselight WHITE=1.0

[gcode_macro CASELIGHT_OFF]
description: Turn caselight off (manual)
gcode:
  SET_GCODE_VARIABLE MACRO=_CASELIGHT_STATE VARIABLE=auto VALUE=0
  SET_LED LED=caselight WHITE=0.0

[gcode_macro CASELIGHT_AUTO_ON]
description: Enable temperature-based caselight control
gcode:
  SET_GCODE_VARIABLE MACRO=_CASELIGHT_STATE VARIABLE=auto VALUE=1
  RESPOND MSG="Caselight AUTO ENABLED"

[gcode_macro CASELIGHT_AUTO_OFF]
description: Disable auto control (manual mode)
gcode:
  SET_GCODE_VARIABLE MACRO=_CASELIGHT_STATE VARIABLE=auto VALUE=0
  RESPOND MSG="Caselight AUTO DISABLED (Manual mode)"

###########################################

[mcu]
# CAN bus is also available on this board
canbus_uuid: 5d6bf3d0366c

[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mcu
# Remove either the serial or canbus_uuid line dependant on your setup.
#serial: /dev/serial/by-id/usb-Cartographer_stm32g431xx_600056000650303448383620-if00
canbus_uuid: 3a7d8bd6d69c
#restart_method: command # Not needed for probes using CAN. 

[cartographer]
mcu: cartographer
x_offset: 0 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 27 # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: no # For extra output

[cartographer touch]
#   The number of samples to use when doing a touch.
#   Constraints: minimum: 3
samples: 3
#   The maximum number of samples to do before giving up.
max_samples: 10
#   The number of noisy samples tolerated within the sliding window. The window size is calculated as samples + max_noisy_samples. A smaller value prevents cherry-picking good samples from a noisy sequence.
#   Constraints: minimum: 0
max_noisy_samples: 2
#   The maximum allowed nozzle temperature to use when touching the plate. This is set to 150C to avoid damaging your plate. Change this AT YOUR OWN RISK.
UNSAFE_max_touch_temperature: 150
#   Radius around the Z home position to do touch.
#   Constraints: minimum: 0.0
EXPERIMENTAL_home_random_radius: 0.0
#   Retract distance (in mm) between touch samples.
#   Constraints: minimum: 1.0
retract_distance: 2.0
#   Acceptable range (in mm) between touch samples.
#   Constraints: minimum: 0.001, maximum: 0.015
sample_range: 0.01

[printer]
kinematics: cartesian
max_velocity: 500
max_accel: 3900
max_z_velocity: 25
max_z_accel: 100
square_corner_velocity: 5

[bed_mesh]
zero_reference_position: 120, 120 # The center of your bed based on nozzle
speed: 200
horizontal_move_z: 3
mesh_min: 25, 25 # Probe coordinates, not nozzle
mesh_max: 210, 210
probe_count: 20, 20
algorithm: bicubic
mesh_pps: 0,0 # Disable interpolation - mesh is probably dense enough

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[safe_z_home]
home_xy_position: 120, 93
speed: 80
z_hop: 10
z_hop_speed: 5

[axis_twist_compensation]
speed: 50
#   The speed (in mm/s) of non-probing moves during the calibration.
#   The default is 50.
horizontal_move_z: 3
#   The height (in mm) that the head should be commanded to move to
#   just prior to starting a probe operation. The default is 5.
calibrate_start_x: 25
#   Defines the minimum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the starting
#   calibration position.
calibrate_end_x: 220
#   Defines the maximum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the ending
#   calibration position.
calibrate_y: 115
#   Defines the Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle during the
#   calibration process. This parameter is recommended to
#   be near the center of the bed

# For Y-axis twist compensation, specify the following parameters:
calibrate_start_y: 35
#   Defines the minimum Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle at the starting
#   calibration position for the Y axis. This parameter must be provided if
#   compensating for Y axis twist.
calibrate_end_y: 193
#   Defines the maximum Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle at the ending
#   calibration position for the Y axis. This parameter must be provided if
#   compensating for Y axis twist.
calibrate_x: 117
#   Defines the X coordinate of the calibration for Y axis twist compensation
#   This should be the X coordinate that positions the nozzle during the
#   calibration process for Y axis twist compensation. This parameter must be
#   provided and is recommended to be near the center of the bed.

