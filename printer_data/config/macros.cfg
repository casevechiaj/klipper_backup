screw1:-14, 114 

# Front row
screw2: -14, 12     # Front Left
screw3: 41, 12
screw4: 120, 12     
screw5: 173, 12     # Front Right

# Middle Row
screw6: 173, 114    # Mid Right 
screw7: 108, 114    
screw8: 48, 114      
#screw8: -14, 114    # Mid Left
#Reference screw8:-14, 114

# Back Row
screw9: -14, 208    # Back Left 
screw10: 102, 208      
screw11: 173, 208   # Back Right  

horizontal_move_z: 2.5
speed: 100
screw_thread: CW-M3 #measure the diameter of your adjustment screw

