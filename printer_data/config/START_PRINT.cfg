[gcode_macro START_PRINT]
description: Start print routine

gcode:
    {% set BED = params.BED_TEMP|default(60)|float %}
    {% set HOTEND = params.EXTRUDER_TEMP|default(240)|float %}

    # --- prep state ---
    G90                         ; absolute positioning
    M83                         ; relative extrusion

    # --- preheat nozzle ---
    M104 S145
	
    # --- bring bed to temp ---
    M190 S{BED}
    G4 P20000                   ; small soak (20s, helps consistency)

    # --- home + mechanics ---
    SET_GCODE_OFFSET Z=0
    G28
    G90
    Z_TILT_ADJUST
    CARTOGRAPHER_TOUCH_HOME
    BED_MESH_CALIBRATE

    # --- move to safe height ---
    G1 Z10 F3000

    ; move to purge start corner (same region as purge line)
    G1 X2 Y2 Z5 F8000

    # --- bring Nozzle to temp ---
    M109 S{HOTEND}

    G4 P5000                   ; brief thermal stabilize
	
    # =========================
    # NOZZLE CLEAN MOVE (PURGE AREA ONLY)
    # =========================

    G92 E0
    M83

    ; small pressure reset
    G1 E1.5 F200

    ; micro-wipe along purge column (same X band as purge line)
    G1 X5 Y2 Z0.28 F3000
    G1 X5 Y22 F3000
    G1 X6 Y22 F3000
    G1 X6 Y2 F3000

    # --- purge line ---
    G92 E0
    G1 X1 Y2 Z0.28 F6000

    G1 E5 F300
    G1 X1 Y22 E10 F1200
    G1 X4 Y22 F6000
    G1 X4 Y2 E10 F1200

    G92 E0